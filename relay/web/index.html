<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rokid HUD 模拟器</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="toolbar">
    <input id="prompt" type="text" placeholder="对 Claude Code 说…(在 sandbox 里干活)" />
    <button id="send">发送</button>
    <button id="stop">停止</button>
    <button id="new">新会话</button>
    <button id="mic">🎤 按住说话</button>
    <label><input type="checkbox" id="guides" checked /> 安全区</label>
    <label><input type="checkbox" id="rotate" /> 旋转90°</label>
    <span id="conn" class="conn">连接中…</span>
  </div>

  <div class="stage">
    <!-- 480x640 原生像素,由 CSS transform 整体放大 -->
    <div id="panel" class="panel">
      <div class="zone zone-top">上禁区 80px</div>
      <div id="content" class="content"></div>
      <div class="zone zone-bottom">下禁区 80px</div>
      <div id="status" class="status">就绪</div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
