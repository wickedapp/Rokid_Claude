<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=480,height=640,initial-scale=1"><title>Focus Lanes</title><style>
*{box-sizing:border-box} html,body{margin:0;width:480px;height:640px;overflow:hidden;background:#000;color:#40ff5e;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.hud{height:640px;padding:38px 13px 14px;display:grid;grid-template-rows:34px 1fr 80px;gap:9px}.top{display:flex;justify-content:space-between;align-items:center}.logo{font-weight:900;font-size:17px}.conn{font-size:12px;border:1px solid #40ff5e;border-radius:8px;padding:5px 8px;background:#06210b}.lanes{display:grid;grid-template-rows:100px 1fr 96px;gap:10px;min-height:0}.lane{border:1px solid #15541f;border-radius:16px;padding:11px;background:#020802;position:relative;overflow:hidden}.lane.focus{border:3px solid #40ff5e;background:#092d10;box-shadow:0 0 18px #40ff5e55}.label{position:absolute;top:7px;right:10px;font-size:10px;color:#91d799}.lane.focus .label{color:#fff}.taskTitle{font-size:18px;color:#fff;margin-top:10px}.taskSub{font-size:12px;color:#a4dfaa;margin-top:8px}.output{font-size:15px;line-height:1.38;padding-top:8px}.line{margin-bottom:8px}.muted{color:#86bc8a}.tool{color:#7dd3ff}.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:20px}.btn{border:1px solid #236b2d;border-radius:12px;text-align:center;padding:10px 4px;background:#010b02;color:#a9ebb0}.btn.sel{background:#40ff5e;color:#001a05;font-weight:900}.bottom{border-top:1px solid #12501d;padding-top:8px}.pad{display:grid;grid-template-columns:70px 1fr 70px;align-items:center;text-align:center;font-size:11px;color:#9edaa5}.enter{border:2px solid #40ff5e;border-radius:12px;padding:8px;color:#fff;background:#06240d}.hint{margin-top:7px;font-size:11px;color:#82c68a;text-align:center}.toast{position:absolute;left:48px;right:48px;bottom:96px;background:#40ff5e;color:#001805;border-radius:12px;padding:10px;text-align:center;font-weight:900;opacity:0;transition:.18s}.toast.show{opacity:1}
</style></head><body><div class="hud"><div class="top"><div class="logo">Rokid Claude</div><div class="conn">已連線 · 遠端</div></div><div class="lanes"><section class="lane focus" data-name="任務"><div class="label">LANE 1 / TASK</div><div class="taskTitle">修復外出連回 Mac</div><div class="taskSub">狀態：完成 · 下一步：選擇 UI 風格</div></section><section class="lane" data-name="輸出"><div class="label">LANE 2 / OUTPUT</div><div class="output"><div class="line tool">▶ start-remote.command updated</div><div class="line muted">ngrok → localhost:8788</div><div class="line">✅ 眼鏡 HUD：已連線</div><div class="line muted">目前焦點在「任務」區；按 ↓ 到輸出。</div></div></section><section class="lane" data-name="操作"><div class="label">LANE 3 / ACTION</div><div class="actions"><div class="btn sel">說話</div><div class="btn">模型</div><div class="btn">網路</div></div></section></div><div class="bottom"><div class="pad"><div>↑↓<br>換區</div><div class="enter">ENTER<br>進入 / 確定</div><div>BACK<br>退出</div></div><div class="hint">在區內用 ←→ 選項；Back 先退出區域，再離開 App</div></div></div><div class="toast" id="toast">進入：任務</div><script>
let lanes=[...document.querySelectorAll('.lane')],i=0,toast=document.getElementById('toast');function f(n){lanes[i].classList.remove('focus');i=(n+lanes.length)%lanes.length;lanes[i].classList.add('focus')}function pop(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),800)}document.addEventListener('keydown',e=>{if(e.key==='ArrowDown')f(i+1);if(e.key==='ArrowUp')f(i-1);if(e.key==='ArrowLeft'||e.key==='ArrowRight'){document.querySelectorAll('.btn').forEach((b,n)=>b.classList.toggle('sel',n==((Date.now()/800|0)%3)));pop('左右：切換目前區選項')}if(e.key==='Enter')pop('進入：'+lanes[i].dataset.name);if(e.key==='Escape'||e.key==='Backspace')pop('Back：退出 '+lanes[i].dataset.name)});
</script></body></html>
